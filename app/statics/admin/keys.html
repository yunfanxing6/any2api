<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any2API - API Keys</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body { background:#faf9f5; }
    .page-hd { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .page-title { font-size:22px; font-weight:700; }
    .page-sub { font-size:13px; color:var(--fg-muted); margin-top:5px; }
    .card { background:#fff; border-radius:14px; padding:18px; margin-bottom:16px; }
    .btn { height:34px; padding:0 14px; border-radius:999px; border:1px solid #e6e6e6; background:#fafafa; font-size:13px; font-weight:600; }
    .btn:hover { background:#f3f3f3; }
    .btn-primary { background:#111; color:#fff; border-color:#111; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
    .field label { font-size:12px; color:#666; font-weight:600; }
    .input, textarea { width:100%; border:1px solid #ececec; border-radius:10px; background:#fbfbfb; padding:10px 12px; font-family:inherit; }
    textarea { min-height:84px; resize:vertical; }
    .check-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .check-item { display:flex; align-items:center; gap:8px; border:1px solid #f0ebe2; border-radius:10px; padding:10px; font-size:13px; }
    .table-wrap { overflow:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:12px 10px; border-bottom:1px solid #f0ebe2; text-align:left; vertical-align:top; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background:#f5f5f5; padding:2px 6px; border-radius:999px; }
    .pill { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; background:#f5f5f5; margin:0 4px 4px 0; font-size:12px; }
    .muted { color:#8a8a8a; font-size:12px; }
    .row-actions { display:flex; gap:8px; flex-wrap:wrap; }
    @media (max-width: 900px) { .grid, .check-grid { grid-template-columns:1fr; } .page-hd { flex-direction:column; } }
  </style>
</head>
<body>
<div id="admin-header" data-active="/admin/keys"></div>
<main class="admin-main">
  <div class="page-hd">
    <div>
      <div class="page-title">API Keys</div>
      <div class="page-sub">统一管理 Any2API 全局密钥，并设置 provider、scope 与备注。配额和花费限制统一由 Every2API 控制。</div>
    </div>
    <button class="btn" id="btn-refresh">刷新</button>
  </div>

  <section class="card">
    <div class="page-title" style="font-size:16px;margin-bottom:14px;">Key 编辑器</div>
    <div class="grid">
      <div>
        <div class="field">
          <label for="key-value">Key</label>
          <input id="key-value" class="input" placeholder="留空可自动生成 sk-any-...">
        </div>
        <div class="field">
          <label for="key-label">Label</label>
          <input id="key-label" class="input" placeholder="例如：every2api-internal / mobile-client / qwen-only">
        </div>
        <div class="field">
          <label for="key-note">Note</label>
          <textarea id="key-note" placeholder="记录这个 key 的用途、归属、限制说明"></textarea>
        </div>
      </div>
      <div>
        <div class="field">
          <label>允许 Provider</label>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" class="provider-check" value="grok" checked> <span>Grok</span></label>
            <label class="check-item"><input type="checkbox" class="provider-check" value="qwen" checked> <span>Qwen</span></label>
            <label class="check-item"><input type="checkbox" class="provider-check" value="chatgpt2api" checked> <span>ChatGPT2API</span></label>
          </div>
        </div>
        <div class="field">
          <label>允许 Scope</label>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" class="scope-check" value="models" checked> <span>models</span></label>
            <label class="check-item"><input type="checkbox" class="scope-check" value="chat" checked> <span>chat</span></label>
            <label class="check-item"><input type="checkbox" class="scope-check" value="responses" checked> <span>responses</span></label>
            <label class="check-item"><input type="checkbox" class="scope-check" value="images" checked> <span>images</span></label>
            <label class="check-item"><input type="checkbox" class="scope-check" value="videos" checked> <span>videos</span></label>
            <label class="check-item"><input type="checkbox" class="scope-check" value="files" checked> <span>files</span></label>
            <label class="check-item"><input type="checkbox" class="scope-check" value="anthropic" checked> <span>anthropic</span></label>
          </div>
        </div>
        <div class="field">
          <label class="check-item" style="width:max-content;"><input type="checkbox" id="key-enabled" checked> <span>启用这个 Key</span></label>
        </div>
      </div>
    </div>
    <div class="row-actions">
      <button class="btn btn-primary" id="btn-save">保存</button>
      <button class="btn" id="btn-generate">自动生成并保存</button>
      <button class="btn" id="btn-reset-form">清空表单</button>
      <span class="muted" id="editor-mode">当前模式：新建</span>
    </div>
  </section>

  <section class="card">
    <div class="page-title" style="font-size:16px;margin-bottom:12px;">Key 列表</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Label</th>
            <th>Provider</th>
            <th>Scope</th>
            <th>状态</th>
            <th>Note</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="keys-body"><tr><td colspan="7" class="muted">加载中...</td></tr></tbody>
      </table>
    </div>
  </section>
</main>
<script src="/static/js/i18n.js?v={{APP_VERSION}}"></script>
<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
let items = [];
let editingKey = '';

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function api(method, path, body) {
  const key = await adminKey.get();
  const res = await fetch(ADMIN_API + path, { method, headers: { ...(body ? { 'Content-Type': 'application/json' } : {}), Authorization: `Bearer ${key}` }, ...(body ? { body: JSON.stringify(body) } : {}) });
  const payload = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(payload.detail || payload.error || res.statusText || String(res.status));
  return payload;
}

function collectValues(selector) {
  return [...document.querySelectorAll(selector)].filter((el) => el.checked).map((el) => el.value);
}

function maskKey(value) {
  return value.length <= 24 ? value : `${value.slice(0, 12)}...${value.slice(-8)}`;
}

function fillForm(item = null) {
  editingKey = item?.key || '';
  document.getElementById('key-value').value = item?.key || '';
  document.getElementById('key-value').disabled = !!item;
  document.getElementById('key-label').value = item?.label || '';
  document.getElementById('key-note').value = item?.note || '';
  document.getElementById('key-enabled').checked = item ? !!item.enabled : true;
  document.querySelectorAll('.provider-check').forEach((el) => { el.checked = !item || (item.providers || []).includes(el.value); });
  document.querySelectorAll('.scope-check').forEach((el) => { el.checked = !item || (item.scopes || []).includes(el.value); });
  document.getElementById('editor-mode').textContent = item ? `当前模式：编辑 ${item.label || item.key}` : '当前模式：新建';
}

async function loadKeys() {
  const payload = await api('GET', '/keys');
  items = payload.items || [];
  const body = document.getElementById('keys-body');
  if (!items.length) {
    body.innerHTML = '<tr><td colspan="7" class="muted">暂无全局 API Key</td></tr>';
    return;
  }
  body.innerHTML = items.map((item) => {
    const keyArg = encodeURIComponent(item.key);
    const copyArg = encodeURIComponent(item.key);
    return `
    <tr>
      <td><code>${maskKey(item.key)}</code></td>
      <td>${escapeHtml(item.label || '-')}</td>
      <td>${(item.providers || []).map((p) => `<span class="pill">${escapeHtml(p)}</span>`).join('')}</td>
      <td>${(item.scopes || []).map((s) => `<span class="pill">${escapeHtml(s)}</span>`).join('')}</td>
      <td>${item.enabled ? '启用' : '禁用'}</td>
      <td class="muted">${escapeHtml(item.note || '-')}</td>
      <td>
        <div class="row-actions">
          <button class="btn" onclick="navigator.clipboard.writeText(decodeURIComponent('${copyArg}'))">复制</button>
          <button class="btn" onclick="editItem(decodeURIComponent('${keyArg}'))">编辑</button>
          <button class="btn" onclick="deleteKey(decodeURIComponent('${keyArg}'))">删除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function editItem(key) {
  const item = items.find((entry) => entry.key === key);
  if (item) fillForm(item);
}

async function save(generate = false) {
  const payload = {
    key: document.getElementById('key-value').value.trim(),
    label: document.getElementById('key-label').value.trim(),
    note: document.getElementById('key-note').value.trim(),
    enabled: document.getElementById('key-enabled').checked,
    providers: collectValues('.provider-check'),
    scopes: collectValues('.scope-check'),
  };
  if (!editingKey && !generate && !payload.key) {
    showToast('请输入 key 或使用自动生成', 'error');
    return;
  }
  const result = editingKey
    ? await api('PUT', `/keys/${encodeURIComponent(editingKey)}`, payload)
    : await api('POST', '/keys', generate ? { ...payload, key: '' } : payload);
  const createdKey = result.item?.key || result.key;
  if (createdKey) navigator.clipboard.writeText(createdKey).catch(() => {});
  fillForm(null);
  await loadKeys();
  showToast(editingKey ? 'API Key 已更新' : 'API Key 已保存并复制到剪贴板', 'success');
}

async function deleteKey(key) {
  if (!confirm('确认删除这个全局 API Key？')) return;
  await api('DELETE', `/keys/${encodeURIComponent(key)}`);
  if (editingKey === key) fillForm(null);
  await loadKeys();
  showToast('API Key 已删除', 'success');
}

(async () => {
  await renderAdminHeader?.();
  await renderSiteFooter?.();
  const key = await adminKey.get();
  if (!key || !await verifyKey(ADMIN_API + '/verify', key).catch(() => false)) return location.href = '/admin/login';
  fillForm(null);
  document.getElementById('btn-refresh').onclick = () => loadKeys().catch((e) => showToast(`刷新失败: ${e.message}`, 'error'));
  document.getElementById('btn-save').onclick = () => save(false).catch((e) => showToast(`保存失败: ${e.message}`, 'error'));
  document.getElementById('btn-generate').onclick = () => save(true).catch((e) => showToast(`生成失败: ${e.message}`, 'error'));
  document.getElementById('btn-reset-form').onclick = () => fillForm(null);
  await loadKeys().catch((e) => showToast(`加载失败: ${e.message}`, 'error'));
})();
</script>
</body>
</html>

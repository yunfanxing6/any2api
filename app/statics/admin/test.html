<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Any2API - 测试中心</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    body { background:#faf9f5; }
    .page-hd { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; }
    .page-title { font-size:22px; font-weight:700; }
    .page-sub { font-size:13px; color:var(--fg-muted); margin-top:5px; }
    .card { background:#fff; border-radius:14px; padding:18px; margin-bottom:16px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
    .field label { font-size:12px; color:#666; font-weight:600; }
    .input, select, textarea { width:100%; border:1px solid #ececec; border-radius:10px; background:#fbfbfb; padding:10px 12px; font-family:inherit; }
    textarea { min-height:120px; resize:vertical; }
    .btn { height:34px; padding:0 14px; border-radius:999px; border:1px solid #e6e6e6; background:#fafafa; font-size:13px; font-weight:600; }
    .btn:hover { background:#f3f3f3; }
    .btn-primary { background:#111; color:#fff; border-color:#111; }
    .output { min-height:160px; white-space:pre-wrap; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; background:#fafafa; border:1px solid #f0ebe2; border-radius:10px; padding:12px; }
    .muted { color:#8a8a8a; font-size:12px; }
    @media (max-width: 900px) { .grid { grid-template-columns:1fr; } .page-hd { flex-direction:column; } }
  </style>
</head>
<body>
<div id="admin-header" data-active="/admin/test"></div>
<main class="admin-main">
  <div class="page-hd">
    <div>
      <div class="page-title">测试中心</div>
      <div class="page-sub">统一测试 Grok / Qwen / ChatGPT2API 的聊天和图片能力。默认使用第一个全局 API Key，也可手动指定。</div>
    </div>
  </div>

  <div class="grid">
    <section class="card">
      <div class="page-title" style="font-size:16px;margin-bottom:14px;">聊天测试</div>
      <div class="field"><label>API Key</label><input id="chat-key" class="input" placeholder="默认自动填充第一个全局 key"></div>
      <div class="field"><label>模型</label><select id="chat-model"><option>grok-4.20-0309-non-reasoning</option><option>grok-4.20-0309</option><option>grok-4.20-0309-reasoning</option><option>qwen3.6-plus:auto</option><option>qwen3.6-plus:fast</option><option>qwen3.6-plus:thinking</option><option>qwen3.5-plus:auto</option><option>qwen3.5-plus:fast</option><option>qwen3.5-plus:thinking</option><option>qwen3.5-omni-plus</option></select></div>
      <div class="field"><label>消息</label><textarea id="chat-message">Reply with exactly: ok</textarea></div>
      <button class="btn btn-primary" id="btn-chat">发送聊天请求</button>
      <div class="muted" style="margin-top:10px;">调用 <code>/v1/chat/completions</code>。若选择 <code>gpt-image-*</code>，请填写图片场景 Prompt。</div>
      <div class="output" id="chat-output" style="margin-top:12px;">等待请求...</div>
    </section>

    <section class="card">
      <div class="page-title" style="font-size:16px;margin-bottom:14px;">图片测试</div>
      <div class="field"><label>API Key</label><input id="image-key" class="input" placeholder="默认自动填充第一个全局 key"></div>
      <div class="field"><label>模型</label><select id="image-model"><option>grok-imagine-image-lite</option><option>qwen3.6-plus</option><option>qwen-image</option><option>qwen-image-plus</option><option>qwen-image-turbo</option></select></div>
      <div class="field"><label>Prompt</label><textarea id="image-prompt">一只赛博朋克风格的猫，霓虹灯背景，超写实风格</textarea></div>
      <button class="btn btn-primary" id="btn-image">发送图片请求</button>
      <div class="muted" style="margin-top:10px;">调用 <code>/v1/images/generations</code></div>
      <div class="output" id="image-output" style="margin-top:12px;">等待请求...</div>
    </section>
  </div>
</main>
<script src="/static/js/i18n.js?v={{APP_VERSION}}"></script>
<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/admin-header.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
<script>
async function adminApi(path) {
  const key = await adminKey.get();
  const res = await fetch(ADMIN_API + path, { headers: { Authorization: `Bearer ${key}` } });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}
async function fillDefaultKeys() {
  const keys = (await adminApi('/keys')).keys || [];
  const first = keys[0] || '';
  document.getElementById('chat-key').value = first;
  document.getElementById('image-key').value = first;
}
const CHAT_FALLBACK_MODELS = [
  'grok-4.20-0309-non-reasoning',
  'grok-4.20-0309',
  'grok-4.20-0309-reasoning',
  'qwen3.6-plus:auto',
  'qwen3.6-plus:fast',
  'qwen3.6-plus:thinking',
  'qwen3.5-plus:auto',
  'qwen3.5-plus:fast',
  'qwen3.5-plus:thinking',
  'qwen3.5-omni-plus',
  'auto',
  'gpt-5',
  'gpt-5-1',
  'gpt-5-2',
  'gpt-5-3',
  'gpt-5-3-mini',
  'gpt-5-mini',
  'gpt-5.4',
  'gpt-image-1',
  'gpt-image-2',
  'codex-gpt-image-2',
];
const IMAGE_FALLBACK_MODELS = [
  'grok-imagine-image-lite',
  'gpt-image-1',
  'gpt-image-2',
  'codex-gpt-image-2',
  'qwen3.6-plus',
  'qwen-image',
  'qwen-image-plus',
  'qwen-image-turbo',
];
const QWEN_IMAGE_MODELS = [
  'qwen3.6-plus',
  'qwen-image',
  'qwen-image-plus',
  'qwen-image-turbo',
];
function uniqueModels(models) {
  const seen = new Set();
  return (models || []).map((item) => String(item || '').trim()).filter((item) => {
    if (!item || seen.has(item)) return false;
    seen.add(item);
    return true;
  });
}
function isQwenModel(model) {
  return String(model || '').trim().toLowerCase().startsWith('qwen');
}
function isChatgptImageModel(model) {
  const lowered = String(model || '').trim().toLowerCase();
  return lowered.startsWith('gpt-image-') || lowered.startsWith('codex-gpt-image-');
}
function classifyModel(model) {
  const lowered = String(model || '').trim().toLowerCase();
  if (!lowered) return 'unknown';
  if (lowered.includes('image-edit')) return 'image-edit';
  if (lowered.includes('video')) return 'video';
  if (lowered.includes('image')) return 'image';
  return 'chat';
}
function setModelOptions(select, models, preferredModel) {
  const previous = String(select.value || '').trim();
  const nextModels = uniqueModels(models);
  select.innerHTML = '';
  nextModels.forEach((model) => {
    const option = document.createElement('option');
    option.value = model;
    option.textContent = model;
    select.appendChild(option);
  });
  if (!nextModels.length) return;
  const nextValue = nextModels.includes(previous)
    ? previous
    : (nextModels.includes(preferredModel) ? preferredModel : nextModels[0]);
  select.value = nextValue;
}
async function fetchAvailableModels(apiKey) {
  if (!apiKey) return [];
  const res = await fetch('/v1/models', {
    cache: 'no-store',
    headers: { Authorization: `Bearer ${apiKey}` },
  });
  if (!res.ok) throw new Error(await res.text());
  const data = await res.json();
  return Array.isArray(data?.data) ? data.data : [];
}
function buildChatModels(items) {
  const ids = items.map((item) => String(item?.id || '').trim());
  return uniqueModels(ids.filter((id) => classifyModel(id) === 'chat' || isChatgptImageModel(id)));
}
function buildImageModels(items) {
  const ids = items.map((item) => String(item?.id || '').trim());
  const grokImageModels = ids.filter((id) => classifyModel(id) === 'image');
  const hasQwenModels = ids.some((id) => isQwenModel(id));
  return uniqueModels([
    ...grokImageModels,
    ...(hasQwenModels ? QWEN_IMAGE_MODELS : []),
  ]);
}
async function refreshModelOptions() {
  const chatKey = document.getElementById('chat-key').value.trim();
  const imageKey = document.getElementById('image-key').value.trim();
  const cache = new Map();
  const load = async (key) => {
    if (!key) return [];
    if (!cache.has(key)) {
      cache.set(key, fetchAvailableModels(key).catch(() => null));
    }
    return cache.get(key);
  };
  const [chatItems, imageItems] = await Promise.all([load(chatKey), load(imageKey)]);
  const chatModels = buildChatModels(chatItems || []);
  const imageModels = buildImageModels(imageItems || []);
  setModelOptions(
    document.getElementById('chat-model'),
    chatModels.length ? chatModels : CHAT_FALLBACK_MODELS,
    'grok-4.20-0309',
  );
  setModelOptions(
    document.getElementById('image-model'),
    imageModels.length ? imageModels : IMAGE_FALLBACK_MODELS,
    'grok-imagine-image-lite',
  );
}
async function callAPI(path, key, payload) {
  const res = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json', ...(key ? { Authorization: `Bearer ${key}` } : {}) }, body: JSON.stringify(payload) });
  const text = await res.text();
  return `${res.status}\n\n${text}`;
}
(async () => {
  await renderAdminHeader?.();
  await renderSiteFooter?.();
  const key = await adminKey.get();
  if (!key || !await verifyKey(ADMIN_API + '/verify', key).catch(() => false)) return location.href = '/admin/login';
  await fillDefaultKeys().catch(() => {});
  await refreshModelOptions().catch(() => {});
  ['chat-key', 'image-key'].forEach((id) => {
    const input = document.getElementById(id);
    input.addEventListener('change', () => { void refreshModelOptions(); });
    input.addEventListener('blur', () => { void refreshModelOptions(); });
  });
  document.getElementById('btn-chat').onclick = async () => {
    const output = document.getElementById('chat-output');
    output.textContent = '请求中...';
    try {
      output.textContent = await callAPI('/v1/chat/completions', document.getElementById('chat-key').value.trim(), {
        model: document.getElementById('chat-model').value,
        stream: false,
        messages: [{ role: 'user', content: document.getElementById('chat-message').value }],
      });
    } catch (e) { output.textContent = String(e); }
  };
  document.getElementById('btn-image').onclick = async () => {
    const output = document.getElementById('image-output');
    output.textContent = '请求中...';
    try {
      output.textContent = await callAPI('/v1/images/generations', document.getElementById('image-key').value.trim(), {
        model: document.getElementById('image-model').value,
        prompt: document.getElementById('image-prompt').value,
        n: 1,
        size: '1024x1024',
        response_format: 'url',
      });
    } catch (e) { output.textContent = String(e); }
  };
})();
</script>
</body>
</html>
